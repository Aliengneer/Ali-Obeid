<style>
    body { 
        background: #0a0118; 
        color: white; 
        font-family: sans-serif; 
        text-align: center; 
        padding: 20px 10px; 
        margin: 0;
    }
    
    h1 { 
        color: #ff0000; 
        text-shadow: 0 0 15px rgba(255, 0, 0, 0.5); 
        margin: 40px 0; 
        font-size: 2.5rem; 
        text-transform: uppercase;
    }

    .yt-grid { 
        display: grid; 
        gap: 15px; 
        padding: 10px;
        grid-template-columns: repeat(2, 1fr); 
        max-width: 1400px; 
        margin: 0 auto; 
    }

    @media (min-width: 900px) { 
        .yt-grid { 
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px;
            padding: 30px;
        }
    }

    .yt-item { 
        border-radius: 12px; 
        overflow: hidden; 
        border: 2px solid rgba(255,0,0,0.2); 
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        min-height:180px;
    }

    .yt-item:hover { 
        transform: translateY(-10px); 
        border-color: #ff0000; 
        box-shadow: 0 10px 25px rgba(255, 0, 0, 0.3); 
    }

    .coming-soon{
        font-size:22px;
        font-weight:bold;
        color:white;
        text-shadow:0 0 12px red;
        margin-bottom:10px;
    }

    .back-home-container {
        margin: 60px 0;
    }

    .back-btn { 
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #ff0000; 
        text-decoration: none; 
        border: 2px solid #ff0000; 
        padding: 15px 40px; 
        border-radius: 50px; 
        transition: 0.3s ease-in-out; 
        font-weight: bold;
        background: rgba(255, 0, 0, 0.05);
    }

    .back-btn:hover { 
        background: #ff0000; 
        color: white; 
        transform: scale(1.1); 
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); 
    }

    /* زرار تواصل معي ثابت مع واتساب */
    .contact-btn {
        position: fixed; 
        top: 20px; 
        right: 20px; 
        background: linear-gradient(45deg, #25D366, #128C7E); 
        color: white;
        padding: 12px 20px;
        border-radius: 50px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 15px #25D366, 0 0 30px #128C7E;
        transition: 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        z-index: 9999;
        display: flex;
        align-items: center;
    }

    .contact-btn:hover {
        transform: scale(1.1) rotate(-2deg); 
        box-shadow: 0 0 20px #25D366, 0 0 40px #128C7E; 
    }
</style>
</head>
