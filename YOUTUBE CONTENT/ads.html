<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial Ads | Ali Obeid</title>
    <style>
        body { background: #0a0118; color: white; font-family: sans-serif; text-align: center; padding: 50px 10px; }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 30px; 
            color: #00f2ff; 
            text-decoration: none; 
            border: 1px solid #00f2ff; 
            padding: 10px 20px; 
            border-radius: 50px; 
            transition: 0.3s; 
        }
        .back-btn:hover { background: #00f2ff; color: black; }
        
        h1 { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; margin-bottom: 40px; font-size: 2.5rem; }

        /* --- تقسيم الشبكة (4 للكمبيوتر) --- */
        .ads-grid { 
            display: grid; 
            gap: 15px; 
            grid-template-columns: repeat(4, 1fr); 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .ad-item { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(0,242,255,0.2); 
            transition: 0.3s; 
        }
        .ad-item:hover { transform: translateY(-5px); border-color: #ff007f; }

        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        .ad-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.3); }
        .ad-info h3 { margin: 0; font-size: 0.9rem; color: #fff; }

        /* --- تعديل الموبايل (2 في الصف) --- */
        @media (max-width: 768px) {
            .ads-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
            }
            h1 { font-size: 1.8rem; }
            .ad-info h3 { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← العودة للرئيسية</a>
    <h1>COMMERCIAL ADS</h1>
    
    <div class="ads-grid">
        <div class="ad-item">
            <iframe src="https://www.youtube.com/embed/YQi8QwmlZk0" allowfullscreen></iframe>
            <div class="ad-info"><h3>مشروع 1</h3></div>
        </div>

        <div class="ad-item">
            <iframe src="https://www.youtube.com/embed/YQi8QwmlZk0" allowfullscreen></iframe>
            <div class="ad-info"><h3>مشروع 2</h3></div>
        </div>

        <div class="ad-item">
            <iframe src="https://www.youtube.com/embed/YQi8QwmlZk0" allowfullscreen></iframe>
            <div class="ad-info"><h3>مشروع 3</h3></div>
        </div>

        <div class="ad-item">
            <iframe src="https://www.youtube.com/embed/YQi8QwmlZk0" allowfullscreen></iframe>
            <div class="ad-info"><h3>مشروع 4</h3></div>
        </div>
    </div>
</body>
</html>
