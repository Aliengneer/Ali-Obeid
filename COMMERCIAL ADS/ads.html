<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Content | Ali Obeid</title>
    <style>
        body { background: #0a0118; color: white; font-family: sans-serif; text-align: center; padding: 50px 10px; }
        
        h1 { color: #ff7a00; text-shadow: 0 0 15px rgba(255, 122, 0, 0.6); margin-bottom: 40px; font-size: 2.5rem; }

        .yt-grid { 
            display: grid; 
            gap: 15px; 
            grid-template-columns: repeat(4, 1fr); 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .yt-item { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255,122,0,0.2); 
            transition: 0.3s;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
        }

        .yt-item:hover { 
            transform: translateY(-5px); 
            border-color: #ff7a00; 
            box-shadow: 0 10px 20px rgba(255, 122, 0, 0.4); 
        }

        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        .yt-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.4); width:100%; }
        .yt-info h3 { margin: 0; font-size: 0.85rem; color: #fff; font-weight: normal; }

        /* مربع قريباً */
        .coming-soon{
            font-size:20px;
            font-weight:bold;
            color:white;
            text-shadow:0 0 12px #ff7a00;
            padding:60px 0;
        }

        .back-btn-wrapper { margin-top: 50px; padding-bottom: 30px; }
        .back-btn { 
            display: inline-block; 
            color: #ff7a00; 
            text-decoration: none; 
            border: 2px solid #ff7a00; 
            padding: 12px 30px; 
            border-radius: 50px; 
            transition: 0.3s; 
            font-weight: bold;
        }

        .back-btn:hover { 
            background: #ff7a00; 
            color: white; 
            transform: scale(1.1); 
            box-shadow: 0 0 20px rgba(255, 122, 0, 0.6); 
        }

        @media (max-width: 768px) {
            .yt-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
