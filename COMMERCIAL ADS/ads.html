    <title>Commercial Ads | Ali Obeid</title>
    <style>
        body { background: #0a0118; color: white; font-family: sans-serif; text-align: center; padding: 50px 10px; }
        
        h1 { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; margin-bottom: 40px; font-size: 2.5rem; }

        /* --- تقسيم الشبكة (4 للكمبيوتر و 2 للموبايل) --- */
        .ads-grid { 
            display: grid; 
            gap: 15px; 
            grid-template-columns: repeat(4, 1fr); 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .ad-item { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(0,242,255,0.2); 
            transition: 0.3s; 
        }
        .ad-item:hover { transform: translateY(-5px); border-color: #ff007f; box-shadow: 0 0 20px rgba(255, 0, 127, 0.2); }

        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        .ad-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.3); }
        .ad-info h3 { margin: 0; font-size: 0.9rem; color: #fff; }

        /* --- تنسيق زرار العودة السفلي --- */
        .back-btn-wrapper { margin-top: 50px; padding-bottom: 30px; }
        .back-btn { 
            display: inline-block; 
            color: #00f2ff; 
            text-decoration: none; 
            border: 2px solid #00f2ff; 
            padding: 12px 30px; 
            border-radius: 50px; 
            transition: 0.3s; 
            font-weight: bold;
        }
        .back-btn:hover { background: #00f2ff; color: black; transform: scale(1.1); box-shadow: 0 0 20px #00f2ff; }

        @media (max-width: 768px) {
            .ads-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
