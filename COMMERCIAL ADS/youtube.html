<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Content | Ali Obeid</title>
    <style>
        body { background: #0a0118; color: white; font-family: sans-serif; text-align: center; padding: 50px 10px; }
        
        .back-btn { 
            display: inline-block; 
            margin-bottom: 30px; 
            color: #ff0000; 
            text-decoration: none; 
            border: 1px solid #ff0000; 
            padding: 10px 20px; 
            border-radius: 50px; 
            transition: 0.3s; 
        }
        .back-btn:hover { background: #ff0000; color: white; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }
        
        h1 { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.5); margin-bottom: 40px; font-size: 2.5rem; }

        /* --- تقسيم الشبكة (4 للكمبيوتر) --- */
        .yt-grid { 
            display: grid; 
            gap: 15px; 
            grid-template-columns: repeat(4, 1fr); 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .yt-item { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255,0,0,0.1); 
            transition: 0.3s; 
        }
        .yt-item:hover { transform: translateY(-5px); border-color: #ff0000; box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2); }

        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        .yt-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.4); }
        .yt-info h3 { margin: 0; font-size: 0.9rem; color: #fff; font-weight: normal; }

        /* --- تعديل الموبايل (2 في الصف) --- */
        @media (max-width: 768px) {
            .yt-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
            }
            h1 { font-size: 1.8rem; }
            .yt-info h3 { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

</body>
