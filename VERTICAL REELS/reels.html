<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>My Reels | Ali Obeid</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .reels-grid { 
            display: grid; gap: 20px; padding: 20px;
            grid-template-columns: repeat(2, 1fr); /* تليفون: 2 */
        }
        @media (min-width: 900px) { 
            .reels-grid { grid-template-columns: repeat(4, 1fr); } /* كمبيوتر: 4 */
        }
        .reel-box { 
            background: #000; border: 2px solid var(--primary); border-radius: 15px; 
            overflow: hidden; aspect-ratio: 9/16; 
            transition: 0.3s;
        }
        .reel-box:hover { transform: translateY(-10px); box-shadow: 0 0 20px var(--primary); }
        .reel-box iframe { width: 100%; height: 100%; border: none; }
        
        .back-btn { 
            display: inline-block; margin: 40px auto; padding: 15px 40px; 
            border: 2px solid white; border-radius: 50px; color: white; 
            text-decoration: none; transition: 0.3s; background: rgba(255,255,255,0.1);
        }
        .back-btn:hover { background: white; color: black; transform: scale(1.05); box-shadow: 0 0 20px white; }
    </style>
</head>
