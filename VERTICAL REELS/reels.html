<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reels | Ali Obeid</title>
    <link rel="stylesheet" href="../style.css">
    <style>

        .reels-grid { 
            display: grid; 
            gap: 15px; 
            padding: 15px;
            grid-template-columns: repeat(2, 1fr); 
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 992px) { 
            .reels-grid { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 25px;
                padding: 40px;
            }
        }

        .reel-box { 
            background: #000; 
            border: 2px solid var(--primary); 
            border-radius: 15px; 
            overflow: hidden; 
            aspect-ratio: 9/16; 
            transition: 0.3s ease-in-out;
            position: relative;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .reel-box:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 10px 30px var(--primary); 
            z-index: 10;
        }

        .reel-box iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* شكل مربع قريباً */
        .coming-soon{
            font-size:22px;
            font-weight:bold;
            color:white;
            text-shadow:0 0 10px var(--primary);
        }

        .back-btn-container {
            margin: 50px 0;
            display: flex;
            justify-content: center;
        }

        .back-btn { 
            display: inline-block; 
            padding: 15px 45px; 
            border: 2px solid var(--primary); 
            border-radius: 50px; 
            color: white; 
            text-decoration: none; 
            transition: 0.3s; 
            background: rgba(0, 242, 255, 0.05);
            font-weight: bold;
        }

        .back-btn:hover { 
            background: var(--primary); 
            color: black; 
            transform: scale(1.1); 
            box-shadow: 0 0 25px var(--primary); 
        }

    </style>
</head>
